<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Video HTML</title>

<style>

body{
    background:#111;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card-video{
    width:700px;
    background:#1a1a1a;
    border:2px solid #FFFFFF;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 20px rgba(176,132,255,.3);
}

.card-video h1{
    color:white;
    font-size:55px;
    margin-bottom:20px;
    letter-spacing:3px;
}

.card-video p{
    color:#d1d5db;
    margin-bottom:25px;
    font-size:18px;
}

.card-video video{
    width:100%;
    border-radius:15px;
    border:2px solid white;
}

</style>
</head>

<body>

<div class="card-video">

    <h1>VIDEO HTML</h1>

   

    <video controls>
        <source src="medusas2.mp4" type="video/mp4">
    </video>

</div>

</body>
</html>
